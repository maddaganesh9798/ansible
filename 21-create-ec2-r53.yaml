
- name: create ec2 and r53 recors
  hosts: local
  connection: local
  vars:
    subnet_id: "subnet-041a4a9b2ebc120c1"
    sg_id: "sg-0bdc6d5500f2d30d5"
    ami_id: "ami-0220d79f3f480ecf5"
    instances:
    - mysql
    - backend
    - frontend
    zone: daws98.store
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: "{{ subnet_id }}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
    loop: "{{ instances }}"
    register: ec2_instance
    
  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_instance}}"

  # - name: create r53 modules
  #   amazon.aws.route53:
  #     state: present
  #     zone: "{{ zone }}"
  #     record: "{{ item.item }}.{{ zone }}"
  #     type: A
  #     ttl: 1
  #     value: "{{ item.insance[0].private_ip_adress }}"
  #     wait: true
  #     overwride: true
  #   loop: "{{ ec2_instance.results }}"

  - name: create r53 private records
    amazon.aws.route53:
      state: present
      zone: "{{ zone }}"
      record: "{{ item.item }}.{{ zone }}" #mysql.daws81s.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
      overwrite: true
    loop: "{{ ec2_instances.results }}"
